{% extends "base.html" %}
{% block title %}Редактировать {{ channel.title }} — СвяZь{% endblock %}
{% block content %}
<div style="max-width:600px;margin:0 auto">
    <div class="card">
        <div class="card-header"><i class="fas fa-edit" style="color:var(--primary)"></i> Редактировать канал</div>
        <div style="padding:1.5rem">
            <form method="POST" action="{{ url_for('channel_edit', channel_name=channel.name) }}" enctype="multipart/form-data">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" name="title" class="form-control" value="{{ channel.title }}" required maxlength="100">
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea name="description" class="form-control" rows="3">{{ channel.description }}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Тип канала</label>
                    <select name="type" class="form-control">
                        <option value="public" {% if channel.type == 'public' %}selected{% endif %}>Публичный</option>
                        <option value="private" {% if channel.type == 'private' %}selected{% endif %}>Приватный</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Аватар</label>
                    <input type="file" name="avatar" class="form-control" accept="image/*">
                </div>

                <div class="form-group">
                    <label class="form-label">Обложка</label>
                    <input type="file" name="cover" class="form-control" accept="image/*">
                </div>

                <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
                    <button type="submit" class="btn btn-primary" style="flex:1"><i class="fas fa-save"></i> Сохранить</button>
                    <a href="{{ url_for('channel_page', channel_name=channel.name) }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card" style="margin-top:1rem">
        <div class="card-header"><i class="fas fa-link" style="color:var(--primary)"></i> Пригласительные ссылки</div>
        <div style="padding:1rem">
            <form method="POST" action="{{ url_for('channel_create_invite', channel_name=channel.name) }}">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <div style="display:flex;gap:0.5rem;align-items:center">
                    <select name="expires_hours" class="form-control" style="width:auto">
                        <option value="24">24 часа</option>
                        <option value="72" selected>3 дня</option>
                        <option value="168">7 дней</option>
                        <option value="720">30 дней</option>
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Создать ссылку</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card" style="margin-top:1rem">
        <div class="card-header"><i class="fas fa-users" style="color:var(--primary)"></i> Управление</div>
        <div style="padding:1rem">
            <a href="{{ url_for('channel_members_page', channel_name=channel.name) }}" class="btn btn-secondary w-100">
                <i class="fas fa-users-cog"></i> Управление участниками
            </a>
        </div>
    </div>
</div>
{% endblock %}
