{% extends "base.html" %}
{% block title %}Sign In — DevConnect{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-text"><i class="fas fa-link"></i> DevConnect</div>
        </div>
        <h2 class="auth-title">Welcome back!</h2>
        <p class="auth-sub">Sign in to your account</p>
        <form method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position:relative">
                    <input type="password" name="password" id="pwdInput" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" onclick="togglePwd()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer">
                        <i class="fas fa-eye" id="pwdEye"></i>
                    </button>
                </div>
            </div>
        <button type="submit" class="btn btn-primary w-100" style="margin-top:0.5rem">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </form>
    <div style="text-align:center;margin-top:1.25rem;font-size:0.9rem;color:var(--text2)">
        Нет аккаунта? <a href="{{ url_for('register') }}" style="color:var(--primary);font-weight:600">Sign Up</a>
    </div>
</div>
</div>
<script>
function togglePwd() {
    const i = document.getElementById('pwdInput');
    const e = document.getElementById('pwdEye');
    if (i.type === 'password') { i.type = 'text'; e.className = 'fas fa-eye-slash'; }
    else { i.type = 'password'; e.className = 'fas fa-eye'; }
}
</script>
{% endblock %}
