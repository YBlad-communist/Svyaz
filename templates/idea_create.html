{% extends "base.html" %}
{% block title %}Создать идею — СвяZь{% endblock %}
{% block content %}
<div style="max-width:720px;margin:0 auto">
    <div class="card">
        <div class="card-header">
            <i class="fas fa-lightbulb" style="color:#f59e0b"></i> Новая идея проекта
        </div>
        <div style="padding:1.5rem">
            <form method="POST" action="{{ url_for('idea_create') }}">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label">Название идеи *</label>
                    <input type="text" name="title" class="form-control" placeholder="Краткое и ёмкое название" maxlength="200" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Описание *</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Опишите вашу идею: что это, зачем, для кого..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Какую проблему решает?</label>
                    <textarea name="problem" class="form-control" rows="3" placeholder="Опишите проблему, которую решает ваш проект..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Предлагаемое решение</label>
                    <textarea name="solution" class="form-control" rows="3" placeholder="Как вы планируете решить эту проблему?"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Технологии</label>
                    <div style="display:flex;flex-wrap:wrap;gap:0.5rem;max-height:200px;overflow-y:auto;padding:0.75rem;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--border)">
                        {% for tech in technologies %}
                        <label style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.3rem 0.65rem;border-radius:50px;background:rgba(99,102,241,0.08);border:1px solid var(--border);cursor:pointer;font-size:0.85rem;transition:all 0.15s"
                               onmouseover="this.style.background='rgba(99,102,241,0.15)'" onmouseout="this.style.background='rgba(99,102,241,0.08)'">
                            <input type="checkbox" name="technologies" value="{{ tech.id }}" style="accent-color:var(--primary)">
                            {{ tech.name }}
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Какие роли нужны в команде?</label>
                    <div style="display:flex;flex-wrap:wrap;gap:0.5rem">
                        {% for role in roles %}
                        <label style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.3rem 0.65rem;border-radius:50px;background:rgba(16,185,129,0.08);border:1px solid var(--border);cursor:pointer;font-size:0.85rem;transition:all 0.15s"
                               onmouseover="this.style.background='rgba(16,185,129,0.15)'" onmouseout="this.style.background='rgba(16,185,129,0.08)'">
                            <input type="checkbox" name="roles" value="{{ role.id }}" style="accent-color:#10b981">
                            <i class="fas {{ role.icon or 'fa-user' }}" style="font-size:0.75rem"></i> {{ role.label }}
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
                    <button type="submit" class="btn btn-primary" style="flex:1">
                        <i class="fas fa-rocket"></i> Опубликовать идею
                    </button>
                    <a href="{{ url_for('ideas_feed') }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
