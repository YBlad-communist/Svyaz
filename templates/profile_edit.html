{% extends "base.html" %}
{% block title %}Редактировать профиль — СвяZь{% endblock %}
{% block content %}
<div style="max-width:720px;margin:0 auto">
    <div class="card">
        <div class="card-header">
            <i class="fas fa-user-edit" style="color:var(--primary)"></i> Редактировать профиль
        </div>
        <div style="padding:1.5rem">
            <form method="POST" action="{{ url_for('profile_edit') }}">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label class="form-label">О себе</label>
                    <textarea name="bio" class="form-control" rows="3" placeholder="Расскажи о себе как о разработчике...">{{ current_user.bio }}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Местоположение</label>
                    <input type="text" name="location" class="form-control" value="{{ current_user.location }}" placeholder="Город, страна">
                </div>

                <div class="form-group">
                    <label class="form-label">Веб-сайт</label>
                    <input type="url" name="website" class="form-control" value="{{ current_user.website }}" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fab fa-github" style="color:#6e5494"></i> GitHub Username</label>
                    <input type="text" name="github_username" class="form-control" value="{{ current_user.github_username or '' }}" placeholder="your-github-username" maxlength="39">
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-code" style="color:var(--primary)"></i> Основная роль</label>
                    <select name="developer_role" class="form-control">
                        <option value="">Не выбрано</option>
                        {% for role_key in developer_roles %}
                        <option value="{{ role_key }}" {% if current_user.developer_role == role_key %}selected{% endif %}>{{ role_key }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-layer-group" style="color:var(--primary)"></i> Стек технологий</label>
                    <div style="display:flex;flex-wrap:wrap;gap:0.5rem;max-height:250px;overflow-y:auto;padding:0.75rem;background:var(--bg2);border-radius:var(--radius-sm);border:1px solid var(--border)">
                        {% for tech in technologies %}
                        <label style="display:inline-flex;align-items:center;gap:0.35rem;padding:0.3rem 0.65rem;border-radius:50px;background:rgba(99,102,241,0.08);border:1px solid var(--border);cursor:pointer;font-size:0.85rem;transition:all 0.15s"
                               onmouseover="this.style.background='rgba(99,102,241,0.15)'" onmouseout="this.style.background='rgba(99,102,241,0.08)'">
                            <input type="checkbox" name="technologies" value="{{ tech.id }}" {% if tech.id in user_tech_ids %}checked{% endif %} style="accent-color:var(--primary)">
                            {{ tech.name }}
                        </label>
                        {% endfor %}
                    </div>
                </div>

                <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
                    <button type="submit" class="btn btn-primary" style="flex:1">
                        <i class="fas fa-save"></i> Сохранить
                    </button>
                    <a href="{{ url_for('profile', username=current_user.username) }}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card" style="margin-top:1rem;border-color:rgba(239,68,68,0.3)">
        <div class="card-header" style="color:#ef4444">
            <i class="fas fa-exclamation-triangle"></i> Опасная зона
        </div>
        <div style="padding:1.25rem">
            <p style="color:var(--text2);font-size:0.9rem;margin:0 0 1rem">
                Удаление аккаунта анонимизирует ваш профиль. Все личные данные будут удалены.
            </p>
            <form method="POST" action="{{ url_for('delete_account') }}" onsubmit="return confirm('Вы уверены? Это действие нельзя отменить.')">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-danger btn-sm">
                    <i class="fas fa-trash"></i> Удалить аккаунт
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
