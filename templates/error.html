{% extends "base.html" %}
{% block title %}Error {{ error_code }} — DevConnect{% endblock %}
{% block content %}
<div style="max-width:500px;margin:5rem auto;text-align:center">
    <div style="font-size:5rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">{{ error_code }}</div>
    <div style="font-size:1.4rem;font-weight:700;margin:1rem 0 0.5rem;color:var(--text)">{{ message }}</div>
    <div style="color:var(--text3);margin-bottom:2rem">Something went wrong. Try going back.</div>
    <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap">
        <a href="{{ url_for('feed') if current_user.is_authenticated else url_for('index') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> Home
        </a>
        <button onclick="history.back()" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </div>
</div>
{% endblock %}
