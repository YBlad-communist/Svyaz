<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#050510"/>
  <rect width="64" height="64" rx="14" fill="url(#g2)"/>
  <!-- Connection nodes -->
  <circle cx="16" cy="20" r="5" fill="url(#g1)" opacity="0.9"/>
  <circle cx="48" cy="20" r="5" fill="url(#g1)" opacity="0.9"/>
  <circle cx="32" cy="46" r="5" fill="url(#g1)" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="16" y1="20" x2="48" y2="20" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <line x1="16" y1="20" x2="32" y2="46" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <line x1="48" y1="20" x2="32" y2="46" stroke="url(#g1)" stroke-width="2" opacity="0.6"/>
  <!-- Center glow -->
  <circle cx="32" cy="28" r="8" fill="url(#g1)" opacity="0.15"/>
</svg>
