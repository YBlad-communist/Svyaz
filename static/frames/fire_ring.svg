<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
  <defs>
    <linearGradient id="fg" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="30%" stop-color="#dc2626"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <mask id="fm"><circle cx="55" cy="55" r="53" fill="white"/><circle cx="55" cy="55" r="44" fill="black"/></mask>
    <filter id="ff"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="55" cy="55" r="53" fill="url(#fg)" mask="url(#fm)"/>
  <!-- Flame flicker overlay -->
  <g mask="url(#fm)" filter="url(#ff)">
    <ellipse cx="55" cy="10" rx="8" ry="14" fill="#fbbf24" opacity="0.7">
      <animate attributeName="ry" values="14;10;16;12;14" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.5;0.9;0.7" dur="0.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="55" rx="14" ry="8" fill="#f97316" opacity="0.6">
      <animate attributeName="rx" values="14;10;16;12;14" dur="1.1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="10" cy="55" rx="14" ry="8" fill="#f97316" opacity="0.6">
      <animate attributeName="rx" values="14;16;10;14" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="55" cy="100" rx="8" ry="14" fill="#fbbf24" opacity="0.7">
      <animate attributeName="ry" values="14;18;11;15;14" dur="1s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <!-- Ember particles -->
  <g fill="#fbbf24" filter="url(#ff)">
    <circle cx="55" cy="4" r="2"><animate attributeName="cy" values="4;2;4" dur="0.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="0.7s" repeatCount="indefinite"/></circle>
    <circle cx="35" cy="8" r="1.5"><animate attributeName="cy" values="8;5;8" dur="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="75" cy="8" r="1.5"><animate attributeName="cy" values="8;6;8" dur="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="1.1s" repeatCount="indefinite"/></circle>
  </g>
</svg>
