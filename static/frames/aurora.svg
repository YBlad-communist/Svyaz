<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
  <defs>
    <linearGradient id="ag1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"><animate attributeName="stop-color" values="#10b981;#06b6d4;#10b981" dur="4s" repeatCount="indefinite"/></stop>
      <stop offset="33%" stop-color="#6366f1"><animate attributeName="stop-color" values="#6366f1;#10b981;#6366f1" dur="3s" repeatCount="indefinite"/></stop>
      <stop offset="66%" stop-color="#ec4899"><animate attributeName="stop-color" values="#ec4899;#6366f1;#ec4899" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <mask id="am"><circle cx="55" cy="55" r="53" fill="white"/><circle cx="55" cy="55" r="44" fill="black"/></mask>
    <filter id="af"><feGaussianBlur stdDeviation="2.5"/></filter>
  </defs>
  <!-- Dark base -->
  <circle cx="55" cy="55" r="53" fill="#0f172a" mask="url(#am)"/>
  <!-- Aurora bands -->
  <g mask="url(#am)">
    <rect x="0" y="0" width="110" height="28" fill="url(#ag1)" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="82" width="110" height="28" fill="url(#ag1)" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="0" width="28" height="110" fill="url(#ag1)" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="82" y="0" width="28" height="110" fill="url(#ag1)" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Shimmer layer -->
    <circle cx="55" cy="55" r="52" fill="none" stroke="rgba(16,185,129,0.5)" stroke-width="4" stroke-dasharray="20 8">
      <animateTransform attributeName="transform" type="rotate" from="0 55 55" to="360 55 55" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="rgba(16,185,129,0.5);rgba(99,102,241,0.5);rgba(236,72,153,0.5);rgba(16,185,129,0.5)" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
