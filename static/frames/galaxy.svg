<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
  <defs>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="40%" stop-color="#1e1b4b"/>
      <stop offset="70%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <mask id="gm"><circle cx="55" cy="55" r="53" fill="white"/><circle cx="55" cy="55" r="44" fill="black"/></mask>
    <filter id="sf"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <circle cx="55" cy="55" r="53" fill="url(#gg)" mask="url(#gm)"/>
  <!-- Swirl -->
  <g mask="url(#gm)">
    <ellipse cx="55" cy="55" rx="50" ry="12" fill="none" stroke="rgba(139,92,246,0.6)" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="0 55 55" to="360 55 55" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="55" cy="55" rx="50" ry="12" fill="none" stroke="rgba(99,102,241,0.4)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="60 55 55" to="420 55 55" dur="5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  <!-- Stars -->
  <g fill="white" filter="url(#sf)">
    <circle cx="55" cy="5" r="1.5"><animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="18" r="1"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="95" cy="30" r="1.2"><animate attributeName="opacity" values="1;0.1;1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="105" cy="55" r="1"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="90" cy="90" r="1.5"><animate attributeName="opacity" values="1;0.3;1" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="20" cy="85" r="1"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="5" cy="55" r="1.2"><animate attributeName="opacity" values="1;0.4;1" dur="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="38" cy="7" r="0.8"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="72" cy="103" r="1"><animate attributeName="opacity" values="1;0.2;1" dur="1.9s" repeatCount="indefinite"/></circle>
  </g>
</svg>
