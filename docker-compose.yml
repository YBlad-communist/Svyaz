# ============================================================
# docker-compose.yml — Production stack
# ============================================================
version: '3.8'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ============================================================
  # PostgreSQL (Master)
  # ============================================================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    secrets:
      - db_password
      - db_replication_password
    environment:
      POSTGRES_USER: svyaz
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: svyaz
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/001_it_social_network.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svyaz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - svyaz_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - svyaz_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # Web (Gunicorn)
  # ============================================================
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/data/uploads
    networks:
      - svyaz_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  # ============================================================
  # Celery Worker (background tasks)
  # ============================================================
  celery-worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    secrets:
      - db_password
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads
    networks:
      - svyaz_net
    command: ["celery", "-A", "celery_app", "worker", "-l", "info", "-c", "4", "--max-tasks-per-child=100"]
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Celery Beat (periodic tasks)
  # ============================================================
  celery-beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    secrets:
      - db_password
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - svyaz_net
    command: ["celery", "-A", "celery_app", "beat", "-l", "info"]
    logging: *default-logging

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads_data:/data/uploads:ro
    depends_on:
      - web
    networks:
      - svyaz_net
    command: >
      sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================================
  # Certbot (SSL auto-renewal)
  # ============================================================
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --quiet --deploy-hook 'nginx -s reload' 2>/dev/null || true;
        sleep 12h & wait $${!};
      done;"
    networks:
      - svyaz_net

  # ============================================================
  # Prometheus (metrics)
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    networks:
      - svyaz_net
    logging: *default-logging

  # ============================================================
  # Grafana (dashboards)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    networks:
      - svyaz_net
    depends_on:
      - prometheus
    logging: *default-logging

secrets:
  db_password:
    file: ./secrets/db_password.txt
  db_replication_password:
    file: ./secrets/db_replication_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt

volumes:
  pg_data:
  redis_data:
  uploads_data:
  prometheus_data:
  grafana_data:

networks:
  svyaz_net:
    driver: bridge
