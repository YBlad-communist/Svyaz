version: '3.8'

services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    secrets:
      - db_password
    volumes:
      - uploads_data:/app/uploads
    networks:
      - svyaz_net
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    secrets:
      - db_password
    environment:
      POSTGRES_USER: svyaz
      POSTGRES_DB: svyaz
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/001_it_social_network.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svyaz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - svyaz_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - svyaz_net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-your-domain.com}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads_data:/app/uploads:ro
    depends_on:
      - web
    networks:
      - svyaz_net
    command: >
      sh -c "envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - svyaz_net

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pg_data:
  redis_data:
  uploads_data:

networks:
  svyaz_net:
    driver: bridge
